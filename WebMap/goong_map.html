function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000; // bán kính Trái Đất (mét)

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c; // khoảng cách (m)
}

function updateLocationFromNative(lat, lng) {
    const userLat = parseFloat(lat);
    const userLng = parseFloat(lng);
    const coords = [userLng, userLat];
    
    
    // 1. Cập nhật hoặc tạo Marker đỏ
    if (!userMarker) {
        userMarker = new mapboxgl.Marker({ color: 'red' }).setLngLat(coords).addTo(map);
    } else {
        userMarker.setLngLat(coords);
    }

    if (typeof isFollowing !== 'undefined' && isFollowing === true) {
        map.easeTo({
            center: coords,
            duration: 500
        });
    }

    // 2. Di chuyển tâm bản đồ tới vị trí mới

        const distance = haversine(lat, lng, poi.lat, poi.lng);
         console.log("Khoảng cách tới điểm 1:", distance);
        
        // Kiểm tra nếu đi vào vùng bán kính
        if (distance <= poi.radius) {
    if (!poi.triggered) {
        poi.triggered = true;

        console.log("🎯 Auto trigger: " + poi.id);

        window.location.href = "poi-click://" + encodeURIComponent(JSON.stringify({
            SiteID: poi.id,
            TourismName: poi.name,
            Address: poi.address || "",
            Latitude: poi.lat,
            Longitude: poi.lng,
            QuickInfo: poi.quickInfo || "",
            Images: poi.images || [] 
        }));
    }
} else {
    poi.triggered = false;
}
    });
